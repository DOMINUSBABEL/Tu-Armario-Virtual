<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Babylon.js 3D Viewer</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; outline: none; }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);
        let currentMesh = null;
        let scene = null;

        const createScene = function () {
            scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0.9, 0.9, 0.9, 1);

            const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 2.5, 5, BABYLON.Vector3.Zero(), scene);
            camera.attachControl(canvas, true);

            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
            light.intensity = 0.7;

            // Placeholder Mesh (e.g., a T-shirt shape could be a cylinder or a custom mesh)
            currentMesh = BABYLON.MeshBuilder.CreateCylinder("garment", {diameterTop: 1.5, diameterBottom: 2, height: 3}, scene);
            
            const material = new BABYLON.StandardMaterial("garmentMat", scene);
            material.diffuseColor = new BABYLON.Color3(0.8, 0.8, 0.8);
            currentMesh.material = material;

            return scene;
        };

        scene = createScene();

        engine.runRenderLoop(function () {
            if (scene) {
                scene.render();
            }
        });

        window.addEventListener("resize", function () {
            engine.resize();
        });

        // Function called from native code to update the texture
        function updateTexture(base64Image) {
            if (currentMesh && currentMesh.material) {
                const texture = new BABYLON.Texture("data:image/png;base64," + base64Image, scene, false, false);
                currentMesh.material.diffuseTexture = texture;
            }
        }
    </script>
</body>
</html>
