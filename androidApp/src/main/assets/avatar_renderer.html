<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background-color: #0F0F13; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <!-- Three.js and GLTFLoader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, model, mixer;
        let clock = new THREE.Clock();

        function init() {
            // Scene setup
            scene = new THREE.Scene();
            scene.background = null; // Transparent/Dark background handled by CSS/Compose

            // Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1, 3); // Adjust based on CesiumMan size

            // Renderer
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);

            // Lighting (Neon/Studio feel)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(5, 5, 5);
            scene.add(dirLight);
            
            const backLight = new THREE.DirectionalLight(0xFF7A9A, 1.5); // Neon Peach backlight
            backLight.position.set(-5, 5, -5);
            scene.add(backLight);

            // Controls
            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enablePan = false;
            controls.target.set(0, 1, 0);
            controls.update();

            // Load GLB Model
            const loader = new THREE.GLTFLoader();
            loader.load('CesiumMan.glb', function (gltf) {
                model = gltf.scene;
                
                // Center and scale the model
                model.position.set(0, 0, 0);
                scene.add(model);

                // Animation
                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(model);
                    mixer.clipAction(gltf.animations[0]).play();
                }
            }, undefined, function (error) {
                console.error(error);
            });

            window.addEventListener('resize', onWindowResize, false);
            document.addEventListener('mousemove', onDocumentMouseMove, false);
            
            animate();
        }

        let mouseX = 0;
        let mouseY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        function onDocumentMouseMove(event) {
            mouseX = (event.clientX - windowHalfX) * 0.001;
            mouseY = (event.clientY - windowHalfY) * 0.001;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            
            // Parallax camera effect
            camera.position.x += (mouseX * 1.5 - camera.position.x) * 0.05;
            camera.position.y += (-mouseY * 1.5 + 1 - camera.position.y) * 0.05;
            camera.lookAt(0, 1, 0);

            renderer.render(scene, camera);
        }

        // --- Bridge Function called from Kotlin ---
        window.applyGarmentTexture = function(imageUrl, isUserUpload = false) {
            console.log("Applying SOTA texture to avatar from URL:", imageUrl);
            if (!model) return;

            const image = new Image();
            image.crossOrigin = "Anonymous"; // Fix for external images in WebGL
            image.onload = function() {
                // UV Warping / Canvas Compositing Hack for SOTA Render
                const canvas = document.createElement('canvas');
                canvas.width = 1024;
                canvas.height = 1024;
                const ctx = canvas.getContext('2d');

                // Fill background (Skin tone base)
                ctx.fillStyle = "#E8C1A8"; 
                ctx.fillRect(0, 0, 1024, 1024);

                // Image processing (Local background removal via Chroma Thresholding)
                if (isUserUpload) {
                    const tmpCanvas = document.createElement('canvas');
                    tmpCanvas.width = image.width;
                    tmpCanvas.height = image.height;
                    const tCtx = tmpCanvas.getContext('2d');
                    tCtx.drawImage(image, 0, 0);
                    const imgData = tCtx.getImageData(0, 0, tmpCanvas.width, tmpCanvas.height);
                    const data = imgData.data;
                    for (let i = 0; i < data.length; i += 4) {
                        // Very bright pixels (white/light bg) -> transparent
                        if (data[i] > 230 && data[i+1] > 230 && data[i+2] > 230) {
                            data[i+3] = 0;
                        }
                    }
                    tCtx.putImageData(imgData, 0, 0);
                    
                    const imgAspect = tmpCanvas.width / tmpCanvas.height;
                    const targetW = 450;
                    const targetH = targetW / imgAspect;
                    ctx.drawImage(tmpCanvas, (1024 - targetW) / 2, 250, targetW, targetH);
                } else {
                    // Pre-processed catalog image
                    const imgAspect = image.width / image.height;
                    const targetW = 450;
                    const targetH = targetW / imgAspect;
                    ctx.drawImage(image, (1024 - targetW) / 2, 250, targetW, targetH);
                }

                const texture = new THREE.CanvasTexture(canvas);
                texture.flipY = false; 
                texture.encoding = THREE.sRGBEncoding;

                // --- SOTA Bump Map Generation (On-the-fly) ---
                const bumpCanvas = document.createElement('canvas');
                bumpCanvas.width = 1024;
                bumpCanvas.height = 1024;
                const bCtx = bumpCanvas.getContext('2d');
                bCtx.drawImage(canvas, 0, 0);
                const bData = bCtx.getImageData(0, 0, 1024, 1024);
                for (let i = 0; i < bData.data.length; i += 4) {
                    // Luminance to grayscale for bump
                    const avg = (bData.data[i] * 0.299 + bData.data[i+1] * 0.587 + bData.data[i+2] * 0.114);
                    bData.data[i] = avg; bData.data[i+1] = avg; bData.data[i+2] = avg;
                }
                bCtx.putImageData(bData, 0, 0);
                const bumpTexture = new THREE.CanvasTexture(bumpCanvas);
                bumpTexture.flipY = false;

                // Apply SOTA PBR Material
                model.traverse(function (child) {
                    if (child.isMesh && child.material) {
                        const newMat = new THREE.MeshPhysicalMaterial({
                            map: texture,
                            bumpMap: bumpTexture,
                            bumpScale: 0.03,
                            roughness: 0.85,    // Fabric is rough
                            metalness: 0.0,     // Non-metal
                            clearcoat: 0.05,    // Slight sheen (Fresnel emulation)
                            clearcoatRoughness: 0.7
                        });
                        child.material = newMat;
                        child.material.needsUpdate = true;
                    }
                });
            };
            image.src = imageUrl;
        };

        // --- Bridge Export to Social Feed ---
        window.exportAvatarSnapshot = function() {
            renderer.render(scene, camera); // force sync render
            const dataUrl = renderer.domElement.toDataURL('image/png');
            if (window.AndroidBridge && window.AndroidBridge.onSnapshotReady) {
                window.AndroidBridge.onSnapshotReady(dataUrl);
            } else {
                console.warn("AndroidBridge not found. Cannot export snapshot to KMP.");
            }
        };

        init();
    </script>
</body>
</html>
