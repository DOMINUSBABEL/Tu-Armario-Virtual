name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle (Debug APK)
      run: ./gradlew :androidApp:assembleDebug

    - name: Build Release APK
      run: ./gradlew :androidApp:assembleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v3
      with:
        name: DY-DressYourself-Debug-APK
        path: androidApp/build/outputs/apk/debug/androidApp-debug.apk

    - name: Upload Release APK (Unsigned)
      uses: actions/upload-artifact@v3
      with:
        name: DY-DressYourself-Release-Unsigned-APK
        path: androidApp/build/outputs/apk/release/androidApp-release-unsigned.apk